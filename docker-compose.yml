services:
  db:
    image: postgis/postgis:16-3.4
    container_name: biosyn-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: biosyn
      POSTGRES_USER: biosyn
      POSTGRES_PASSWORD: biosyn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biosyn -d biosyn"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: biosyn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for Detail Aid files in local development.
  # In production this is replaced with AWS S3 (or any S3-compatible bucket).
  minio:
    image: minio/minio:latest
    container_name: biosyn-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: biosyn
      MINIO_ROOT_PASSWORD: biosyn-dev-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
